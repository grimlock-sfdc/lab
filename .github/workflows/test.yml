name: Test

on:
  workflow_call:
    inputs:
      repo:
        required: true
        type: string

env:
  GO_REQUIRED_MIN_VERSION: ''

jobs:
  reviewable:
    name: Ensure PR is reviewable & run tests
    runs-on: ubuntu-latest
    concurrency:
      group: test-${{ github.ref }}-${{ inputs.repo }}-reviewable
      cancel-in-progress: true
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4
        with:
          fetch-depth: 1
          fetch-tags: true
          submodules: 'recursive'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install DevSpace
        uses: loft-sh/setup-devspace@main

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v5
        with:
          go-version: 1.26.1
          # See: https://github.com/actions/setup-go/issues/424
          # go-version-file: go.work
          cache-dependency-path: "**/go.sum"

      - name: Ensure Reviewable
        id: ensure-reviewable
        run: |
          set -e
          cd ${{ inputs.repo }} && make check-diff

      - name: Commit reviewable diff
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v6
        if: failure() && steps.ensure-reviewable.outcome == 'failure'
        with:
          commit_message: "ci: make reviewable"

      - name: Test
        id: test
        run: cd ${{ inputs.repo }} && make test-unit

  test-chart:
    name: Run Helm Chart Tests
    runs-on: ubuntu-latest
    if: hashFiles('${{ inputs.repo }}/charts/**') != ''
    permissions:
      contents: read
      id-token: write
    env:
      IMAGE: ${{ inputs.repo }}
      IMAGE_TAG: dev
    concurrency:
      group: test-${{ github.ref }}-${{ inputs.repo }}-test-chart
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - name: Set up Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4
        with:
          version: v3.11.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: '3.13'
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0
        with:
          version: v3.13.0

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          set -e
          changed=$(ct list-changed --chart-dirs ${{ inputs.repo }}/charts)
          echo $changed
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No Helm changes detected. Skipping chart testing!"
          fi

      - name: Prime Helm repos
        if: steps.list-changed.outputs.changed == 'true'  
        id: prime-helm-repos
        run: |
          set -e

          chart_path="${{ inputs.repo }}/charts/${{ inputs.repo }}"
          dependency_count=$(yq eval '.dependencies | length' "$chart_path/Chart.yaml")
          if [[ "$dependency_count" -lt 1 ]]; then
            echo "No dependencies found in Chart.yaml. Skipping helm repo operations."
            exit 0
          fi

          repos_added=0
          while read -r repo_name repo_url; do
            if [[ ! "$repo_url" =~ ^(oci://|file://) ]]; then
              helm repo add "$repo_name" "$repo_url"
              repos_added=$((repos_added + 1))
            else
              echo "Skipping repository $repo_url for $repo_name"
            fi
          done < <(yq eval '.dependencies[] | .name + " " + .repository' "$chart_path/Chart.yaml")

          if [[ "$repos_added" -gt 0 ]]; then
            helm repo update
          fi
          helm dependency update "$chart_path"

      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --chart-dirs ${{ inputs.repo }}/charts --check-version-increment=false

      - name: Format cluster name
        id: format-cluster-name
        run: |
          set -e
          sha=${{ github.sha }}
          truncated_sha=$(echo $sha | cut -c1-7)
          cluster_name=${{ inputs.repo }}-$truncated_sha-ct
          echo "cluster_name=$cluster_name" >> "$GITHUB_OUTPUT"

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          version: v0.27.0
          cluster_name: ${{ steps.format-cluster-name.outputs.cluster_name }}
          node_image: kindest/node:v1.31.9

      - name: Build Docker Image
        if: steps.list-changed.outputs.changed == 'true'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./${{ inputs.repo }}
          file: ./${{ inputs.repo }}/build/Dockerfile.base
          platforms: linux/amd64
          target: production
          tags: |
            ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
          builder: ${{ steps.buildx.outputs.name }}
          push: false
          cache-from: type=gha,scope=${{ github.ref_name }}-${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
          cache-to: type=gha,scope=${{ github.ref_name }}-${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
          load: true

      - name: Load image & create namespace
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          kind load docker-image ${{ env.IMAGE }}:${{ env.IMAGE_TAG }} --name ${{ steps.format-cluster-name.outputs.cluster_name }}
          kubectl config use-context kind-${{ steps.format-cluster-name.outputs.cluster_name }}
          kubectl create namespace ocm-labs

      - name: Install cert-manager
        if: steps.list-changed.outputs.changed == 'true' && inputs.repo == 'fleetconfig-controller'
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update jetstack
          helm install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --set crds.enabled=true \
            --wait

      - name: Run chart-testing (install)
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          ct install \
            --namespace ocm-labs \
            --chart-dirs ${{ inputs.repo }}/charts \
            --helm-extra-set-args \
              '--set=image.repository=${{ env.IMAGE }} --set=image.tag=${{ env.IMAGE_TAG }} --set=cert-manager.enabled=false'
